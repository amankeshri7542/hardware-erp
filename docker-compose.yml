version: '3.9'

services:
  # ─── Backend API + Frontend (served by Express in production) ────
  api:
    build: .
    container_name: erp-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
    volumes:
      # PDF output (local fallback when S3 not configured)
      - pdf_output:/app/backend/pdf-output
      - purchase_invoices:/app/backend/purchase-invoices
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - erp-net

  # ─── Redis for BullMQ PDF queue ───────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - erp-net

  # ─── PDF Worker (BullMQ consumer) ─────────────────────────────────
  pdf-worker:
    build: .
    container_name: erp-pdf-worker
    restart: unless-stopped
    command: node worker.js
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium-browser
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - pdf_output:/app/backend/pdf-output
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - erp-net

  # ─── Nginx reverse proxy ──────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: erp-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - erp-net

volumes:
  redis_data:
  pdf_output:
  purchase_invoices:

networks:
  erp-net:
    driver: bridge
